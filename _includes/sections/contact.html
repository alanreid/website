<!-- Contact -->
<section id="contact" class="contact-section">
  <div class="container">
    <div class="section-header fade-in">
      <span class="section-label">Contact</span>
      <h2>Let's Talk</h2>
      <p>Got a challenge that needs a technical perspective?</p>
      <p class="contact-email">
        Fill in the form or send me an email to
        <a href="mailto:mail@alanreid.de">mail@alanreid.de</a>
      </p>
    </div>

    <form
      action="https://submit-form.com/qNTD9rgzB"
      method="POST"
      class="contact-form fade-in"
    >
      <input
        type="checkbox"
        name="country"
        style="display: none"
        tabindex="-1"
        autocomplete="off"
        aria-hidden="true"
      />
      <input
        type="text"
        name="name"
        placeholder="Name"
        required
        aria-label="Name"
      />
      <input
        type="email"
        name="email"
        placeholder="Email"
        required
        aria-label="Email"
      />
      <textarea
        name="message"
        placeholder="Tell me about your project..."
        rows="4"
        required
        aria-label="Message"
      ></textarea>
      <p class="form-privacy-notice">
        Your data will be processed via Formspark to handle your inquiry. See
        the
        <a target="_blank" rel="noopener noreferrer" href="privacy.html"
          >Privacy Policy</a
        >.
      </p>
      <button type="submit" class="btn btn-primary">Send message</button>
    </form>
  </div>
</section>
